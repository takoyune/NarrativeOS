[image]
# Output format for all images: webp, jpeg, or png
format = webp

# WebP/JPEG quality (1-100). Higher = better quality, larger file
quality = 90

# Maximum file size in MB before compression kicks in
max_size_mb = 1.5

# Maximum image dimension (width or height) in pixels. Images larger than this will be downscaled
max_dimension = 2000

# WebP compression method (0-6). Higher = slower but smaller files
webp_method = 4

[output]
# Language code for the EPUB metadata (e.g. id, en, ja)
language = id

# Where to save the output EPUB: "parent" = parent folder of the novel, "same" = same folder as the novel
output_location = parent

# Filename format for the output EPUB
# Available variables: {title}, {volume}, {folder_name}
# Example: "{folder_name}" → "Danshi_Kinsei_Game_Volume_1.epub"
output_name_format = {folder_name}

[styling]
# Enable drop cap (large first letter) on the first paragraph of each chapter
drop_cap = false

# Scene break symbol displayed between scenes
scene_break_symbol = ❖ ❖ ❖

# Font size for body text in the EPUB (in em units)
font_size = 1.0

# Line height / leading for body text (unitless multiplier)
line_height = 1.8

# Text indent for paragraphs (in em units, 0 = no indent)
text_indent = 1.5

[build]
# Auto-convert all images to the target format before building
auto_convert_images = true

# Auto-compress images that exceed max_size_mb
auto_compress = true

# Download online images (URLs in markdown) automatically
download_online_images = true

# Number of download retries for online images
download_retries = 3

# Download timeout in seconds
download_timeout = 30
