[image]
format = webp
quality = 90
max_size_mb = 1.5
max_dimension = 2000
webp_method = 4

[output]
language = id
output_location = parent
output_name_format = {parent_folder_name} Volume {volume}

[styling]
drop_cap = false
scene_break_symbol = ❖ ❖ ❖
font_size = 1.0
line_height = 1.8
text_indent = 1.5
theme = zinc-purple

[build]
auto_convert_images = true
auto_compress = true
download_online_images = true
download_retries = 3
download_timeout = 30

[Settings]
max_logs = 1000

